name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: cargo-bins/cargo-binstall@main
    - name: Add wasm target
      run: rustup target add wasm32-unknown-unknown
    - name: Install Trunk
      run: |
        cargo binstall trunk --locked --no-confirm
    #- name: Install gnostr
    #  run: |
    #    cargo binstall gnostr --locked --no-confirm
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: |
        cargo test --verbose --lib
    - name: Build web app
      run: trunk build --verbose
    - name: Serve web app and verify content
      run: |
        trunk serve --address 127.0.0.1 --port 8080 --no-autoreload true --open false &
        TRUNK_PID=$!
        trap 'kill $TRUNK_PID' EXIT

        for i in $(seq 1 30); do
          if curl -fsS http://127.0.0.1:8080 > /tmp/trunk-index.html; then
            break
          fi
          sleep 2
        done

        curl -fsS http://127.0.0.1:8080 | grep -F 'RandyMcMillan/gnostr-wasm'
        curl -fsS http://127.0.0.1:8080 | grep -F 'rust.yml/badge.svg'
