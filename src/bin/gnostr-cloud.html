<style>
  :root {
    --wry-bg: rgba(7, 13, 28, 0.92);
    --wry-bg-2: rgba(15, 23, 42, 0.84);
    --wry-line: rgba(148, 163, 184, 0.18);
    --wry-text: #e2e8f0;
    --wry-muted: #94a3b8;
    --wry-accent: #60a5fa;
    --wry-accent-2: #a78bfa;
    --wry-good: #34d399;
    --wry-shadow: 0 24px 80px rgba(2, 6, 23, 0.42);
    --wry-radius: 18px;
    --wry-chrome-height: 112px;
  }

  /* Hide scrollbar for Chrome, Safari and Opera */
  ::-webkit-scrollbar {
    display: none;
  }

  /* Hide scrollbar for IE, Edge and Firefox */
  html {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }

  #wry-browser-host,
  #wry-browser-host * {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }

  #wry-browser-host::-webkit-scrollbar,
  #wry-browser-host *::-webkit-scrollbar {
    display: none;
    width: 0;
    height: 0;
  }

  #wry-browser-host {
    position: fixed;
    inset: 14px 14px auto 14px;
    z-index: 2147483647;
    pointer-events: none;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  #wry-browser-ui {
    pointer-events: auto;
    color: var(--wry-text);
    border: 1px solid var(--wry-line);
    border-radius: 24px;
    background:
      linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.78)),
      radial-gradient(circle at top left, rgba(96, 165, 250, 0.14), transparent 28%),
      radial-gradient(circle at top right, rgba(167, 139, 250, 0.12), transparent 24%);
    box-shadow: var(--wry-shadow);
    backdrop-filter: blur(22px);
    overflow: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  #wry-browser-ui::-webkit-scrollbar,
  .wry-topbar::-webkit-scrollbar,
  .wry-subbar::-webkit-scrollbar,
  .wry-footer::-webkit-scrollbar,
  .wry-nav::-webkit-scrollbar,
  .wry-bookmark::-webkit-scrollbar {
    width: 0;
    height: 0;
    display: none;
  }

  .wry-topbar {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(148, 163, 184, 0.12);
    overflow: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .wry-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 176px;
  }

  .wry-logo {
    width: 40px;
    height: 40px;
    border-radius: 14px;
    display: grid;
    place-items: center;
    font-weight: 800;
    color: white;
    background: linear-gradient(135deg, var(--wry-accent), var(--wry-accent-2));
    box-shadow: 0 12px 28px rgba(96, 165, 250, 0.32);
  }

  .wry-brand h1 {
    margin: 0;
    font-size: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .wry-brand p {
    margin: 2px 0 0;
    color: var(--wry-muted);
    font-size: 12px;
  }

  .wry-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
    padding: 10px;
    border: 1px solid rgba(148, 163, 184, 0.14);
    border-radius: 18px;
    background: rgba(2, 6, 23, 0.36);
    overflow: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .wry-btn,
  .wry-go,
  .wry-bookmark {
    border: 1px solid rgba(148, 163, 184, 0.14);
    color: var(--wry-text);
    background: rgba(30, 41, 59, 0.72);
    transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
  }

  .wry-btn:hover,
  .wry-go:hover,
  .wry-bookmark:hover {
    transform: translateY(-1px);
    border-color: rgba(96, 165, 250, 0.36);
  }

  .wry-btn,
  .wry-go {
    height: 40px;
    border-radius: 14px;
    cursor: pointer;
  }

  .wry-btn {
    width: 40px;
    display: grid;
    place-items: center;
    font-size: 16px;
  }

  .wry-address {
    flex: 1;
    min-width: 0;
    height: 40px;
    border: 1px solid rgba(148, 163, 184, 0.18);
    border-radius: 14px;
    padding: 0 14px;
    color: var(--wry-text);
    background: rgba(15, 23, 42, 0.94);
    outline: none;
    font-size: 14px;
  }

  .wry-address:focus {
    border-color: rgba(96, 165, 250, 0.7);
    box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.12);
  }

  .wry-go {
    padding: 0 16px;
    background: linear-gradient(135deg, var(--wry-accent), var(--wry-accent-2));
    font-weight: 700;
  }

  .wry-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--wry-muted);
    font-size: 12px;
    white-space: nowrap;
  }

  .wry-dot {
    width: 10px;
    height: 10px;
    border-radius: 999px;
    background: var(--wry-good);
    box-shadow: 0 0 0 6px rgba(52, 211, 153, 0.12);
    transition: background 0.18s ease, box-shadow 0.18s ease;
  }

  .wry-dot[data-state="loading"] {
    background: #facc15;
    box-shadow: 0 0 0 6px rgba(250, 204, 21, 0.14);
  }

  .wry-dot[data-state="offline"] {
    background: #ef4444;
    box-shadow: 0 0 0 6px rgba(239, 68, 68, 0.14);
  }

  .wry-subbar {
    display: none;
  }

  .wry-label {
    color: var(--wry-muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .wry-bookmark {
    height: 34px;
    padding: 0 14px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 13px;
  }

  .wry-hint {
    margin-left: auto;
    color: var(--wry-muted);
    font-size: 12px;
  }

  .wry-hint kbd {
    padding: 2px 6px;
    border-radius: 6px;
    border: 1px solid rgba(148, 163, 184, 0.16);
    background: rgba(30, 41, 59, 0.72);
    color: var(--wry-text);
    font-family: inherit;
    font-size: 11px;
  }

  .wry-footer {
    position: fixed;
    left: 14px;
    right: 14px;
    bottom: 14px;
    z-index: 2147483647;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 0 14px;
    border: 1px solid rgba(148, 163, 184, 0.14);
    border-radius: 999px;
    background: rgba(15, 23, 42, 0.84);
    box-shadow: 0 12px 30px rgba(2, 6, 23, 0.28);
    color: var(--wry-muted);
    font-size: 11px;
    letter-spacing: 0.04em;
    backdrop-filter: blur(18px);
    overflow: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .wry-footer strong {
    color: var(--wry-text);
    font-weight: 600;
  }

  .wry-footer-status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
</style>

<div id="wry-browser-ui" aria-label="Browser navigation">
  <div class="wry-topbar">
    <div class="wry-brand">
      <div class="wry-logo">G</div>
      <div>
        <h1>gnostr.cloud</h1>
        <p>Persistent navigation for every page</p>
      </div>
    </div>

    <div class="wry-nav" role="search">
      <button class="wry-btn" data-back title="Back">←</button>
      <button class="wry-bookmark" data-url="http://gnostr.cloud" title="Home">🏠</button>
      <button class="wry-btn" data-forward title="Forward">→</button>
      <button class="wry-btn" data-reload title="Reload">↻</button>
      <input class="wry-address" data-address spellcheck="false" autocomplete="off" value="http://gnostr.cloud" />
      <button class="wry-go" data-go>Go</button>
    </div>

  </div>

  <div class="wry-subbar">
    <button class="wry-bookmark" data-url="https://news.ycombinator.com" aria-label="Hacker News"></button>
  </div>

  <div id="wry-browser-footer" class="wry-footer" aria-label="Browser footer">
    <span class="wry-footer-status"><span class="wry-dot" data-dot data-state="ready"></span><strong data-status>Ready</strong></span>
  </div>
</div>
